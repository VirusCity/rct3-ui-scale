; RollerCoaster Tycoon 3 — UI Scale
;
; Deploy this file next to the game's RCT3.exe, alongside the built d3d9.dll.
; All keys are optional; the values shown below are the defaults.

[Scaling]
; UI size multiplier. 1.0 = stock. Larger = bigger UI.
;   1.15 - 1.5  comfortable on a 1440p/4K display
;   ~2.0        large
;   up to 4.0   allowed (very large)
;
; How it works: RCT3 lays its entire UI out on an internal "canvas" the size of
; your screen resolution, then maps that canvas to the display. This mod shrinks
; that canvas by UiScale, so the game itself lays the whole UI out bigger —
; fonts, toolbars and windows alike — with correct edge-anchoring AND mouse
; hit-testing (clicks land exactly where the larger buttons are drawn).
;
; Note: at high values some edge-docked toolbars can extend past the screen
; edge. If that happens, lower UiScale. Set the value before launching the game.
UiScale=1.25

[Display]
; Borderless-windowed ("borderless fullscreen") mode. RCT3 itself only offers
; windowed or exclusive fullscreen; this strips the window border and sizes the
; window to cover your monitor, rendering at desktop resolution.
; 1 = on, 0 = off. Tip: launch the game in WINDOWED mode for the smoothest result
; (alt-tab is instant); exclusive fullscreen is converted to borderless too.
Borderless=0

[Diagnostics]
; Write a timestamped d3d9_uiscale.log next to the DLL.
; 1 = on (handy if something looks wrong), 0 = off for normal play.
LoggingEnabled=1

; Optional absolute path for the log file. Blank = d3d9_uiscale.log next to the DLL.
LogPath=

; --- Porting aid (advanced) -------------------------------------------------
; DiscoverSignatures: set to 1 ONLY if you run a non-Steam / non-Complete edition
; where the UI doesn't scale. It's read-only and does NOT change anything — it
; scans the game, then once you open a park it writes a ready-to-paste
; [Signatures] block to the log (look for the line marked "*** CONFIRMED ***").
; Copy that block into the [Signatures] section below, set this back to 0, and
; restart. Tip: you can leave UiScale=1.0 while discovering — no patching needed.
DiscoverSignatures=0

[Signatures]
; Manual lever overrides — ONLY for porting to an edition the built-in
; signatures don't fit. Leave the whole section blank on RCT3 Complete (Steam):
; the mod resolves everything automatically there.
;
; Fill these from the DiscoverSignatures log block above (preferred), or from
; your own Ghidra/x64dbg analysis. RVAs are exe-relative (image base subtracted).
; Each key is independent: set only the ones you have. RVAs win over signatures.
;
; -- Raw RVAs (most reliable) --
CreateMainRVA=
CreateAltRVA=
DesktopGlobalRVA=
CanvasRectOffset=
;
; -- AOB signatures (optional; survive that edition's future patches) --
; Same syntax as the built-in patterns: hex bytes, "??" = wildcard.
AltGuardSig=
AltGuardGlobalOff=
CreatorStoreSig=
CreatorStoreGlobalOff=
PrologueSig=
