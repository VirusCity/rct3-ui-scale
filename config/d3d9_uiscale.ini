; RCT3 UI Scale — configuration
;
; Deploy this file next to the game executable, alongside the built d3d9.dll.
; All keys are optional; the values below are the defaults.

[General]
; UI scale multiplier. 1.0 = stock size. Try 1.5 for 1440p, ~2.0 for 4K.
; Valid range 0.1–10.0; out-of-range values are ignored.
; For the 4K render-side proof, 1.5 is a good starting point (try 2.0 for bigger).
ScaleFactor=1.25

; Master logging switch. 1 = write d3d9_uiscale.log (use while testing).
; 0 = no logging (use for normal play).
LoggingEnabled=1

[Advanced]
; Optional absolute path for the log file. Blank = d3d9_uiscale.log next to the DLL.
LogFile=

[Diagnostics]
; Built-in frame inspector (our RenderDoc substitute — DX9 has no RenderDoc).
; 1 = enabled. Press CaptureKey in-game to dump the next frame's draw calls.
Enabled=1

; Virtual-key code for the capture hotkey. 0x7A = F11 (F12 is Steam's screenshot
; key, so it's avoided). Decimal or 0x-hex both work.
CaptureKey=0x7A

; Matrix probe: on capture, dump 16 floats (a 4x4 matrix) from exe_base+ProbeRVA
; to the log — used to characterise the GUI2 global transform matrix candidate
; (see research/ghidra_notes.md). 0x1188100 = static VA 0x1588100. 0 disables.
ProbeRVA=0x1188100

[Scaling]
; Render-side UI scaling: scale UI draws by ScaleFactor, anchored by screen-edge
; contact. 1 = on at startup, 0 = off at startup. Default 0 so the main menu /
; scenario select stay unscaled; press ToggleKey (F10) once you're in a park.
Enabled=0

; Virtual-key to toggle scaling on/off at runtime (visuals + input together).
; 0x79 = F10. Use it to switch scaling off on menus and on in-game.
ToggleKey=0x79

; Remap mouse input so clicks land on the scaled UI (inverse-transforms the
; window's mouse messages; leaves 3D world picking untouched). 1 = on.
; If world clicking ever feels off, set 0 to scale visuals only and compare.
RemapInput=1

[SourcePatch]
; EXPERIMENTAL — see research/ghidra_notes.md ("GUI2 scale system").
; When 1, at startup the mod rewrites the GUI2 element constructors so the
; per-element scale (element + 0xF0) defaults to ScaleFactor instead of 1.0 —
; asking the game to lay its own UI out bigger. If it works, this fixes both the
; visuals AND mouse hit-testing at the source (no render-side hack needed).
;
; IMPORTANT: do NOT run this together with [Scaling] Enabled=1 / the F10 toggle,
; or the UI gets scaled twice. For the test: set [Scaling] Enabled=0 and
; [SourcePatch] Enabled=1, keep LoggingEnabled=1, and check the log for the
; "sourcepatch: ... site(s) found, N patched" line.
Enabled=0
