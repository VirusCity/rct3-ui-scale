; RCT3 UI Scale — configuration
;
; Deploy this file next to the game executable, alongside the built d3d9.dll.
; All keys are optional; the values below are the defaults.

[General]
; UI scale multiplier. 1.0 = stock size. Try 1.5 for 1440p, ~2.0 for 4K.
; Valid range 0.1–10.0; out-of-range values are ignored.
ScaleFactor=1.5

; Master logging switch. 1 = write d3d9_uiscale.log (use while testing).
; 0 = no logging (use for normal play).
LoggingEnabled=1

[Advanced]
; Optional absolute path for the log file. Blank = d3d9_uiscale.log next to the DLL.
LogFile=

[Diagnostics]
; Built-in frame inspector (our RenderDoc substitute — DX9 has no RenderDoc).
; 1 = enabled. Press CaptureKey in-game to dump the next frame's draw calls.
Enabled=1

; Virtual-key code for the capture hotkey. 0x7A = F11 (F12 is Steam's screenshot
; key, so it's avoided). Decimal or 0x-hex both work.
CaptureKey=0x7A
